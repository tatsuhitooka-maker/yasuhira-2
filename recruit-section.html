<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RECRUIT Section - TOYOKOH Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       Reset & Base
    ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      scroll-behavior: auto;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: #0d0d0d;
      color: #fff;
      overflow-x: hidden;
    }

    /* ============================================
       Spacer
    ============================================ */
    .spacer-top {
      height: 100vh;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #555;
      letter-spacing: 0.1em;
    }

    .spacer-bottom {
      height: 100vh;
      background: #0d0d0d;
    }

    /* ============================================
       RECRUIT Section
    ============================================ */
    .Recruit {
      position: relative;
      background-color: #1a1c22;
      min-height: 350vh;
    }

    /* Sticky viewport — スクロール中ビューポートに固定 */
    .Recruit-content {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    /* ============================================
       Image Gallery — 3列パララックス
    ============================================ */
    .Recruit-imageWrapper {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1.5rem;
      width: 100%;
      max-width: 1400px;
      height: 100%;
      padding: 0 1rem;
    }

    /* 各列 — 縦に画像を並べる */
    .Recruit-line {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      will-change: transform;
    }

    /* 個別の画像カード */
    .Recruit-image {
      flex-shrink: 0;
      width: 100%;
      aspect-ratio: 3 / 4;
      border-radius: 6px;
      overflow: hidden;
    }

    .Recruit-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 画像の上に暗いオーバーレイ */
    .Recruit-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 28, 34, 0.55);
      z-index: 1;
      pointer-events: none;
    }

    /* ============================================
       Text Wrapper — 画像の上にオーバーレイ
    ============================================ */
    .Recruit-textWrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .Recruit-textInner {
      text-align: center;
      pointer-events: auto;
    }

    /* ( Recruit ) タイトル */
    .Recruit-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(20px);
    }

    /* 大見出し "Create Innovation" */
    .Recruit-lead {
      line-height: 0.9;
      margin-bottom: 2.5rem;
    }

    .Recruit-leadRow {
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    .Recruit-leadChar {
      display: inline-block;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-weight: 500;
      font-size: clamp(3rem, 9vw, 8rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      transform: translateY(110%);
      will-change: transform;
    }

    .Recruit-leadChar.is-space {
      width: 0.3em;
    }

    /* 日本語テキスト */
    .Recruit-text {
      font-size: 1rem;
      font-weight: 500;
      line-height: 2;
      letter-spacing: 0.06em;
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: translateY(30px);
    }

    /* Read More ボタン */
    .Recruit-button {
      opacity: 0;
      transform: translateY(20px);
    }

    .Recruit-button a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 200px;
      padding: 1rem 2.5rem;
      background: transparent;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: background 0.4s ease, border-color 0.4s ease;
    }

    .Recruit-button a:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.7);
    }

    /* ============================================
       Responsive
    ============================================ */
    @media (max-width: 820px) {
      .Recruit {
        min-height: 300vh;
      }

      .Recruit-imageWrapper {
        gap: 0.8rem;
        padding: 0 0.5rem;
      }

      .Recruit-line {
        gap: 0.8rem;
      }

      .Recruit-leadChar {
        font-size: clamp(2.2rem, 11vw, 4.5rem);
      }

      .Recruit-text {
        font-size: 0.85rem;
        padding: 0 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="spacer-top">Scroll Down</div>

  <!-- ============================================
       RECRUIT SECTION
  ============================================ -->
  <div class="Recruit">
    <div class="Recruit-content">

      <!-- 3列画像ギャラリー -->
      <div class="Recruit-imageWrapper">
        <!-- 列1（下→上にスクロール） -->
        <div class="Recruit-line" data-direction="down">
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=500&q=80" alt=""></div>
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1581092160607-ee22621dd758?w=500&q=80" alt=""></div>
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?w=500&q=80" alt=""></div>
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=500&q=80" alt=""></div>
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=500&q=80" alt=""></div>
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1531482615713-2afd69097998?w=500&q=80" alt=""></div>
        </div>

        <!-- 列2（上→下にスクロール） -->
        <div class="Recruit-line" data-direction="up">
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1556761175-5973dc0f32e7?w=500&q=80" alt=""></div>
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=500&q=80" alt=""></div>
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1552664730-d307ca884978?w=500&q=80" alt=""></div>
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1560179707-f14e90ef3623?w=500&q=80" alt=""></div>
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=500&q=80" alt=""></div>
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=500&q=80" alt=""></div>
        </div>

        <!-- 列3（下→上にスクロール） -->
        <div class="Recruit-line" data-direction="down">
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=500&q=80" alt=""></div>
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1553877522-43269d4ea984?w=500&q=80" alt=""></div>
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1573164713714-d95e436ab8d6?w=500&q=80" alt=""></div>
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1606857521015-7f9fcf423740?w=500&q=80" alt=""></div>
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=500&q=80" alt=""></div>
          <div class="Recruit-image"><img src="https://images.unsplash.com/photo-1559136555-9303baea8ebd?w=500&q=80" alt=""></div>
        </div>
      </div>

      <!-- 暗いオーバーレイ -->
      <div class="Recruit-overlay"></div>

      <!-- テキストオーバーレイ -->
      <div class="Recruit-textWrapper">
        <div class="Recruit-textInner">
          <h2 class="Recruit-title">( Recruit )</h2>
          <p class="Recruit-lead">
            <span class="Recruit-leadRow" data-row="0"><!-- Create --></span>
            <span class="Recruit-leadRow" data-row="1"><!-- Innovation --></span>
          </p>
          <p class="Recruit-text">
            まだ、世の中にない価値を<br>
            一緒につくり、育てていきませんか?
          </p>
          <div class="Recruit-button">
            <a href="#">Read More</a>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="spacer-bottom"></div>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* ============================================
       1. 大見出しの文字分割
    ============================================ */
    const headingLines = ["Create", "Innovation"];
    const rows = document.querySelectorAll('.Recruit-leadRow');
    rows.forEach((row, i) => {
      headingLines[i].split('').forEach(char => {
        const span = document.createElement('span');
        span.className = 'Recruit-leadChar' + (char === ' ' ? ' is-space' : '');
        span.textContent = char === ' ' ? '' : char;
        row.appendChild(span);
      });
    });

    /* ============================================
       2. 画像列のパララックス（スクロール連動）
    ============================================ */
    const recruitSection = document.querySelector('.Recruit');
    const lines = document.querySelectorAll('.Recruit-line');

    lines.forEach((line, i) => {
      const direction = line.dataset.direction;
      // 列の総高さから画面高さを引いた分だけスクロールさせる
      const images = line.querySelectorAll('.Recruit-image');
      const totalH = images.length * (images[0].offsetHeight + 24); // 24 = gap

      // 初期位置: down列は上寄せ(0)、up列は下寄せ(マイナス)
      if (direction === 'up') {
        gsap.set(line, { y: -(totalH - window.innerHeight) * 0.4 });
      }

      // スクロールに連動してパララックス移動
      const yDistance = direction === 'down' ? -(totalH * 0.35) : (totalH * 0.25);

      gsap.to(line, {
        y: `+=${yDistance}`,
        ease: 'none',
        scrollTrigger: {
          trigger: recruitSection,
          start: 'top bottom',
          end: 'bottom top',
          scrub: 1,
        }
      });
    });

    /* ============================================
       3. テキスト登場アニメーション
    ============================================ */
    const chars = document.querySelectorAll('.Recruit-leadChar');

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: recruitSection,
        start: 'top 50%',
        end: 'top 10%',
        scrub: false,
        toggleActions: 'play none none reverse',
      }
    });

    // ( Recruit ) タイトル
    tl.to('.Recruit-title', {
      opacity: 1,
      y: 0,
      duration: 0.6,
      ease: 'power3.out'
    }, 0);

    // 大見出し 1文字ずつ
    tl.to(chars, {
      y: 0,
      duration: 1,
      ease: 'power4.out',
      stagger: { each: 0.03, from: 'start' }
    }, 0.1);

    // 日本語テキスト
    tl.to('.Recruit-text', {
      opacity: 1,
      y: 0,
      duration: 0.8,
      ease: 'power3.out'
    }, 0.5);

    // ボタン
    tl.to('.Recruit-button', {
      opacity: 1,
      y: 0,
      duration: 0.8,
      ease: 'power3.out'
    }, 0.6);

    /* ============================================
       4. 退場アニメーション — セクション後半でフェードアウト
    ============================================ */
    const exitTl = gsap.timeline({
      scrollTrigger: {
        trigger: recruitSection,
        start: '55% top',
        end: '65% top',
        scrub: true,
      }
    });

    exitTl.to('.Recruit-title', { opacity: 0, y: -20, duration: 0.3 }, 0);
    exitTl.to('.Recruit-lead', { opacity: 0, duration: 0.4 }, 0);
    exitTl.to('.Recruit-text', { opacity: 0, y: -20, duration: 0.3 }, 0.1);
    exitTl.to('.Recruit-button', { opacity: 0, y: -20, duration: 0.3 }, 0.15);
  </script>

</body>
</html>
