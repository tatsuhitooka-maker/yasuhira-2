<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RECRUIT Section - TOYOKOH Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       Reset & Base
    ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      scroll-behavior: auto;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: #222222;
      color: #fff;
      overflow-x: hidden;
    }

    /* ============================================
       Spacer
    ============================================ */
    .spacer-top {
      height: 100vh;
      background: #222222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #555;
      letter-spacing: 0.1em;
    }

    .spacer-bottom {
      height: 100vh;
      background: #222222;
    }

    /* ============================================
       RECRUIT Section
    ============================================ */
    .Recruit {
      position: relative;
      background-color: #222222;
      min-height: 350vh;
    }

    /* Sticky viewport — スクロール中ビューポートに固定 */
    .Recruit-content {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    /* ============================================
       Image Gallery — 2行横スクロール
    ============================================ */
    .Recruit-imageWrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem 0;
    }

    /* 各行 — 横に画像を並べる */
    .Recruit-line {
      display: flex;
      gap: 1.5rem;
      will-change: transform;
    }

    /* 個別の画像カード */
    .Recruit-image {
      flex-shrink: 0;
      width: 28vw;
      aspect-ratio: 3 / 2;
      border-radius: 6px;
      overflow: hidden;
    }

    .Recruit-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 画像の上に暗いオーバーレイ */
    .Recruit-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 28, 34, 0.55);
      z-index: 1;
      pointer-events: none;
    }

    /* ============================================
       Text Wrapper — 画像の上にオーバーレイ
    ============================================ */
    .Recruit-textWrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .Recruit-textInner {
      text-align: center;
      pointer-events: auto;
    }

    /* サブタイトル */
    .Recruit-sub {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0;
      transform: translateY(20px);
    }

    /* 大見出し "FA Solution" */
    .Recruit-lead {
      line-height: 0.9;
      margin-bottom: 2.5rem;
    }

    .Recruit-leadRow {
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    .Recruit-leadChar {
      display: inline-block;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-weight: 500;
      font-size: clamp(3rem, 9vw, 8rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      transform: translateY(110%);
      will-change: transform;
    }

    .Recruit-leadChar.is-space {
      width: 0.3em;
    }

    /* 日本語テキスト */
    .Recruit-text {
      font-size: 1rem;
      font-weight: 500;
      line-height: 2;
      letter-spacing: 0.06em;
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: translateY(30px);
    }

    /* Read More ボタン */
    .Recruit-button {
      opacity: 0;
      transform: translateY(20px);
    }

    .Recruit-button a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 200px;
      padding: 1rem 2.5rem;
      background: transparent;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: background 0.4s ease, border-color 0.4s ease;
    }

    .Recruit-button a:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.7);
    }

    /* ============================================
       Responsive
    ============================================ */
    @media (max-width: 820px) {
      .Recruit {
        min-height: 300vh;
      }

      .Recruit-imageWrapper {
        gap: 0.8rem;
      }

      .Recruit-line {
        gap: 0.8rem;
      }

      .Recruit-image {
        width: 45vw;
      }

      .Recruit-leadChar {
        font-size: clamp(2.2rem, 11vw, 4.5rem);
      }

      .Recruit-text {
        font-size: 0.85rem;
        padding: 0 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="spacer-top">Scroll Down</div>

  <!-- ============================================
       RECRUIT SECTION
  ============================================ -->
  <div class="Recruit">
    <div class="Recruit-content">

      <!-- 2行横スクロール画像ギャラリー -->
      <div class="Recruit-imageWrapper">
        <!-- 行1（右→左にスクロール） -->
        <div class="Recruit-line" data-direction="left">
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img01.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img02.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img03.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img04.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img05.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img06.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img07.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img08.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img01.png" alt=""></div>
        </div>

        <!-- 行2（左→右にスクロール） -->
        <div class="Recruit-line" data-direction="right">
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img05.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img06.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img07.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img08.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img01.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img02.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img03.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img04.png" alt=""></div>
          <div class="Recruit-image"><img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img05.png" alt=""></div>
        </div>
      </div>

      <!-- 暗いオーバーレイ -->
      <div class="Recruit-overlay"></div>

      <!-- テキストオーバーレイ -->
      <div class="Recruit-textWrapper">
        <div class="Recruit-textInner">
          <p class="Recruit-sub">Innovate Your Production</p>
          <p class="Recruit-lead">
            <span class="Recruit-leadRow" data-row="0"><!-- FA Solution --></span>
          </p>
          <p class="Recruit-text">
            従来の工程に課題を抱える現場へ。<br>
            ヤスヒラのFA装置は、生産性向上・省人化・品質改善を<br>
            同時に実現し、お客様の製造現場を次のステージへ進化させます。
          </p>
          <div class="Recruit-button">
            <a href="#">Read More</a>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="spacer-bottom"></div>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* ============================================
       1. 大見出しの文字分割
    ============================================ */
    const headingLines = ["FA Solution"];
    const rows = document.querySelectorAll('.Recruit-leadRow');
    rows.forEach((row, i) => {
      headingLines[i].split('').forEach(char => {
        const span = document.createElement('span');
        span.className = 'Recruit-leadChar' + (char === ' ' ? ' is-space' : '');
        span.textContent = char === ' ' ? '' : char;
        row.appendChild(span);
      });
    });

    /* ============================================
       2. 画像行の横パララックス（スクロール連動）
    ============================================ */
    const recruitSection = document.querySelector('.Recruit');
    const lines = document.querySelectorAll('.Recruit-line');

    lines.forEach((line, i) => {
      const direction = line.dataset.direction;
      const images = line.querySelectorAll('.Recruit-image');
      const totalW = images.length * (images[0].offsetWidth + 24);

      // 初期位置: right行は左寄せ、left行は右端からスタート
      if (direction === 'left') {
        gsap.set(line, { x: -(totalW - window.innerWidth) * 0.3 });
      } else {
        gsap.set(line, { x: -totalW * 0.15 });
      }

      // スクロールに連動して横移動
      const xDistance = direction === 'left' ? (totalW * 0.3) : -(totalW * 0.3);

      gsap.to(line, {
        x: `+=${xDistance}`,
        ease: 'none',
        scrollTrigger: {
          trigger: recruitSection,
          start: 'top bottom',
          end: 'bottom top',
          scrub: 1,
        }
      });
    });

    /* ============================================
       3. テキスト登場アニメーション
    ============================================ */
    const chars = document.querySelectorAll('.Recruit-leadChar');

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: recruitSection,
        start: 'top 50%',
        end: 'top 10%',
        scrub: false,
        toggleActions: 'play none none reverse',
      }
    });

    // サブタイトル
    tl.to('.Recruit-sub', {
      opacity: 1,
      y: 0,
      duration: 0.6,
      ease: 'power3.out'
    }, 0);

    // 大見出し 1文字ずつ
    tl.to(chars, {
      y: 0,
      duration: 1,
      ease: 'power4.out',
      stagger: { each: 0.03, from: 'start' }
    }, 0.1);

    // 日本語テキスト
    tl.to('.Recruit-text', {
      opacity: 1,
      y: 0,
      duration: 0.8,
      ease: 'power3.out'
    }, 0.5);

    // ボタン
    tl.to('.Recruit-button', {
      opacity: 1,
      y: 0,
      duration: 0.8,
      ease: 'power3.out'
    }, 0.6);

    /* ============================================
       4. 退場アニメーション — セクション後半でフェードアウト
    ============================================ */
    const exitTl = gsap.timeline({
      scrollTrigger: {
        trigger: recruitSection,
        start: '55% top',
        end: '65% top',
        scrub: true,
      }
    });

    exitTl.to('.Recruit-sub', { opacity: 0, y: -20, duration: 0.3 }, 0);
    exitTl.to('.Recruit-lead', { opacity: 0, duration: 0.4 }, 0);
    exitTl.to('.Recruit-text', { opacity: 0, y: -20, duration: 0.3 }, 0.1);
    exitTl.to('.Recruit-button', { opacity: 0, y: -20, duration: 0.3 }, 0.15);
  </script>

</body>
</html>
