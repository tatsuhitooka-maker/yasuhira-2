<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABOUT Section - TOYOKOH Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       Reset & Base
    ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      scroll-behavior: auto;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: #222222;
      color: #fff;
      overflow-x: hidden;
    }

    /* ============================================
       Spacer (上下の余白 - iframe埋め込み時は不要なら削除)
    ============================================ */
    .spacer-top {
      height: 100vh;
      background: #222222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #555;
      letter-spacing: 0.1em;
    }

    /* ============================================
       ABOUT Section
    ============================================ */
    .About {
      position: relative;
      background-color: #222222;
      color: #fff;
      /* padding-top: コンテンツ出現前の余白
         padding-bottom: ほぼなし＝リリース後すぐ次セクションへ
         min-height: stickyの保持時間を決める（大きい＝長く固定） */
      padding-top: 15vh;
      padding-bottom: 0;
      min-height: 220vh;
      /* overflow: hidden を外す — sticky が正しく動作するために必須 */
    }

    /* Sticky Content — スクロール中ビューポート上部に固定
       セクション末尾で自然にリリースされ、上に流れ去る */
    .About-content {
      position: sticky;
      top: 8vh;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem;
      z-index: 2;
    }

    /* ============================================
       ( ABOUT ) Title
    ============================================ */
    .About-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-align: center;
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(20px);
    }

    /* ============================================
       Big Heading - "BEAUTIFULLY FOR THE FUTURE"
    ============================================ */
    .About-lead {
      text-align: center;
      line-height: 0.85;
      margin-bottom: 2rem;
    }

    .SectionLead-row {
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    .SectionLead-char {
      display: inline-block;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-weight: 500;
      font-size: clamp(3rem, 10vw, 10rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      transform: translateY(110%);
      will-change: transform;
    }

    /* Space character */
    .SectionLead-char.is-space {
      width: 0.3em;
    }

    /* ============================================
       Text Wrapper - 右寄せレイアウト
    ============================================ */
    .About-textWrapper {
      margin-left: auto;
      max-width: 480px;
    }

    /* ============================================
       Japanese Subtitle
    ============================================ */
    .About-leadJa {
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 500;
      text-align: right;
      margin-bottom: 2rem;
      opacity: 0;
      transform: translateY(30px);
    }

    /* ============================================
       Description Text
    ============================================ */
    .About-description {
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 2;
      letter-spacing: 0.06em;
      margin-bottom: 2rem;
      opacity: 0;
      transform: translateY(30px);
    }

    /* ============================================
       READ MORE Button
    ============================================ */
    .About-button {
      width: fit-content;
      opacity: 0;
      transform: translateY(20px);
    }

    .About-button a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 200px;
      padding: 1rem 2.5rem;
      background: #000;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.15);
      transition: background 0.4s ease, border-color 0.4s ease;
    }

    .About-button a:hover {
      background: #333;
      border-color: rgba(255,255,255,0.4);
    }

    /* ============================================
       Background Floating Images
    ============================================ */
    .About-background {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 1480px;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .About-bgImage {
      position: absolute;
      overflow: hidden;
      border-radius: 4px;
      opacity: 0;
      will-change: transform, opacity;
    }

    .About-bgImage img,
    .About-bgImage video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Image positions (desktop) - 元サイト準拠の配置
       画像は大見出しと重なるが、小さいテキストには被らないよう配置 */
    .About-bgImage.-no01 {
      top: 8%;
      left: 1%;
      width: 18rem;
      height: 11rem;
    }

    .About-bgImage.-no02 {
      top: 6%;
      right: 0;
      width: 14rem;
      height: 8rem;
    }

    .About-bgImage.-no03 {
      top: 44%;
      left: 4%;
      width: 9rem;
      height: 6rem;
    }

    .About-bgImage.-no04 {
      top: 62%;
      right: 2%;
      width: 15rem;
      height: 10.5rem;
    }

    .About-bgImage.-no05 {
      top: 78%;
      left: 3%;
      width: 28rem;
      height: 17rem;
    }

    /* ============================================
       Bottom Spacer
    ============================================ */
    .spacer-bottom {
      height: 100vh;
      background: #222222;
    }

    /* ============================================
       Responsive
    ============================================ */
    @media (max-width: 820px) {
      .About {
        padding-top: 10vh;
        padding-bottom: 60vh;
        min-height: 250vh;
      }

      .About-content {
        top: 5vh;
        padding: 0 1rem;
      }

      .SectionLead-char {
        font-size: clamp(2.5rem, 12vw, 5rem);
      }

      .About-description {
        max-width: 100%;
        margin-left: 0;
        font-size: 0.85rem;
      }

      .About-leadJa {
        text-align: center;
      }

      .About-button {
        margin: 0 auto;
      }

      .About-bgImage.-no01 { width: 10rem; height: 6rem; top: 25%; left: 2%; }
      .About-bgImage.-no02 { width: 8rem; height: 5rem; top: 10%; right: 0; }
      .About-bgImage.-no03 { width: 6rem; height: 4rem; top: 50%; left: 5%; }
      .About-bgImage.-no04 { width: 9rem; height: 6rem; top: 45%; right: 3%; }
      .About-bgImage.-no05 { width: 14rem; height: 9rem; top: 70%; left: 2%; }
    }
  </style>
</head>
<body>

  <!-- 上スペーサー（スクロール開始用 / iframe時は削除可） -->
  <div class="spacer-top">Scroll Down</div>

  <!-- ============================================
       ABOUT SECTION
  ============================================ -->
  <section class="About">

    <!-- Floating Background Images -->
    <div class="About-background">
      <div class="About-bgImage -no01">
        <img src="https://images.unsplash.com/photo-1513828583688-c52646db42da?w=600&q=80" alt="">
      </div>
      <div class="About-bgImage -no02">
        <img src="https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=600&q=80" alt="">
      </div>
      <div class="About-bgImage -no03">
        <video src="https://www.w3schools.com/html/mov_bbb.mp4" loop muted autoplay playsinline></video>
      </div>
      <div class="About-bgImage -no04">
        <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=600&q=80" alt="">
      </div>
      <div class="About-bgImage -no05">
        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=80" alt="">
      </div>
    </div>

    <!-- Sticky Content -->
    <div class="About-content">

      <!-- ( ABOUT ) -->
      <h2 class="About-title">( About )</h2>

      <!-- Big Heading -->
      <p class="About-lead">
        <span class="SectionLead-row" data-row="0">
          <!-- "Beautifully" -->
        </span>
        <span class="SectionLead-row" data-row="1">
          <!-- "for the" -->
        </span>
        <span class="SectionLead-row" data-row="2">
          <!-- "Future" -->
        </span>
      </p>

      <!-- 右寄せテキストブロック -->
      <div class="About-textWrapper">
        <!-- Japanese Subtitle -->
        <p class="About-leadJa">キレイに、未来へ</p>

        <!-- Description -->
        <p class="About-description">
          CoolでCleanでCreativeな現場を実現し、壊さず使い続ける循環型社会を築く。そして、地球を美しい姿のまま次世代へ継承する方法を追求します。
        </p>

        <!-- Button -->
        <div class="About-button">
          <a href="#">Read More</a>
        </div>
      </div>

    </div>
  </section>

  <!-- 下スペーサー -->
  <div class="spacer-bottom"></div>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* ============================================
       1. 文字を1文字ずつ <span> に分割
    ============================================ */
    const headingLines = [
      "Beautifully",
      "for the",
      "Future"
    ];

    const rows = document.querySelectorAll('.SectionLead-row');
    rows.forEach((row, rowIndex) => {
      const text = headingLines[rowIndex];
      text.split('').forEach(char => {
        const span = document.createElement('span');
        span.className = 'SectionLead-char' + (char === ' ' ? ' is-space' : '');
        span.textContent = char === ' ' ? '' : char;
        row.appendChild(span);
      });
    });

    /* ============================================
       2. メインタイムライン（スクロール連動）
    ============================================ */
    const aboutSection = document.querySelector('.About');
    const chars = document.querySelectorAll('.SectionLead-char');

    // Master timeline
    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: aboutSection,
        start: 'top 60%',
        end: 'top 10%',
        scrub: false,
        toggleActions: 'play none none reverse',
      }
    });

    // ( ABOUT ) title fade in
    tl.to('.About-title', {
      opacity: 1,
      y: 0,
      duration: 0.6,
      ease: 'power3.out'
    }, 0);

    // 文字送りアニメーション - 1文字ずつ stagger
    tl.to(chars, {
      y: 0,
      duration: 1,
      ease: 'power4.out',
      stagger: {
        each: 0.03,
        from: 'start'
      }
    }, 0.1);

    // 日本語サブタイトル
    tl.to('.About-leadJa', {
      opacity: 1,
      y: 0,
      duration: 0.8,
      ease: 'power3.out'
    }, 0.5);

    // 説明文
    tl.to('.About-description', {
      opacity: 1,
      y: 0,
      duration: 0.8,
      ease: 'power3.out'
    }, 0.6);

    // ボタン
    tl.to('.About-button', {
      opacity: 1,
      y: 0,
      duration: 0.8,
      ease: 'power3.out'
    }, 0.7);

    /* ============================================
       3. 背景画像のスライドイン + パララックス
          各画像が配置方向からシュッと滑り込む
    ============================================ */
    const bgImages = document.querySelectorAll('.About-bgImage');

    // 各画像のスライドイン方向を定義
    // no01: 左上 → 左から, no02: 右上 → 右から, no03: 左中 → 左から,
    // no04: 右下 → 右から, no05: 左下 → 左から
    const slideDirections = [
      { x: -120, y: 40 },   // no01: 左から
      { x: 100, y: 30 },    // no02: 右から
      { x: -80, y: 20 },    // no03: 左から
      { x: 100, y: 30 },    // no04: 右から
      { x: -100, y: 20 },   // no05: 左から
    ];

    bgImages.forEach((img, i) => {
      const dir = slideDirections[i] || { x: 0, y: 40 };

      // 初期位置をオフセット
      gsap.set(img, { x: dir.x, y: dir.y });

      // スライドイン — 方向から素早くシュッと入る
      gsap.to(img, {
        opacity: 1,
        x: 0,
        y: 0,
        duration: 0.8,
        ease: 'power3.out',
        scrollTrigger: {
          trigger: aboutSection,
          start: `top ${55 - i * 7}%`,
          toggleActions: 'play none none reverse',
        }
      });

      // スクロールに連動したパララックス（ゆっくり上に動く）
      gsap.to(img, {
        y: -80 - (i * 30),
        ease: 'none',
        scrollTrigger: {
          trigger: aboutSection,
          start: 'top bottom',
          end: 'bottom top',
          scrub: 1.5,
        }
      });
    });

    /* ============================================
       4. 退場アニメーション — セクション50%でフェードアウト
          子要素のみアニメーション（.About-content自体は
          transformを変えない＝sticky維持）
    ============================================ */
    const exitTl = gsap.timeline({
      scrollTrigger: {
        trigger: aboutSection,
        start: '40% top',
        end: '52% top',
        scrub: true,
      }
    });

    // タイトル
    exitTl.to('.About-title', {
      opacity: 0,
      y: -20,
      duration: 0.3,
    }, 0);

    // 大見出し — コンテナごとフェード（個別charのtransformと干渉しない）
    exitTl.to('.About-lead', {
      opacity: 0,
      duration: 0.4,
    }, 0);

    // 日本語サブタイトル
    exitTl.to('.About-leadJa', {
      opacity: 0,
      y: -20,
      duration: 0.3,
    }, 0.1);

    // 説明文
    exitTl.to('.About-description', {
      opacity: 0,
      y: -20,
      duration: 0.3,
    }, 0.15);

    // ボタン
    exitTl.to('.About-button', {
      opacity: 0,
      y: -20,
      duration: 0.3,
    }, 0.2);
  </script>

</body>
</html>
