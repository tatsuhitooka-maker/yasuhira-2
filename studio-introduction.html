<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: #222222;
      color: #fff;
      overflow-x: hidden;
    }

    .spacer-top { height: 100vh; background: #222222; }
    .spacer-bottom { height: 100vh; background: #222222; }

    /* INTRODUCTION Section */
    .Introduction {
      position: relative;
      background-color: #222222;
      color: #fff;
      padding-top: 12vh;
      padding-bottom: 0;
      min-height: 250vh;
    }

    .Introduction-content {
      position: sticky;
      top: 8vh;
      max-width: 1430px;
      margin: 0 auto;
      padding: 0 2rem;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    .Introduction-textSide { padding-top: 2rem; }

    .Introduction-title {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(20px);
    }

    .Introduction-lead { line-height: 0.9; margin-bottom: 2.5rem; }

    .SectionLead-row {
      display: flex;
      justify-content: flex-start;
      overflow: hidden;
    }

    .SectionLead-char {
      display: inline-block;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-weight: 500;
      font-size: clamp(3.5rem, 9vw, 8.25rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      transform: translateY(110%);
      will-change: transform;
    }

    .SectionLead-char.is-space { width: 0.3em; }

    .Introduction-headJa {
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      font-weight: 700;
      line-height: 1.8;
      margin-bottom: 2rem;
      opacity: 0;
      transform: translateY(30px);
    }

    .Introduction-description {
      font-size: 0.95rem;
      font-weight: 400;
      line-height: 2.2;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: translateY(30px);
    }

    .Introduction-button {
      width: fit-content;
      opacity: 0;
      transform: translateY(20px);
    }

    .Introduction-button a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 200px;
      padding: 1rem 2.5rem;
      background: transparent;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: background 0.4s ease, border-color 0.4s ease;
    }

    .Introduction-button a:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.6);
    }

    .Introduction-imageSide {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .Introduction-image {
      border-radius: 6px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(40px);
      will-change: transform, opacity;
    }

    .Introduction-image img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    .Introduction-image.-main { aspect-ratio: 4 / 3; }
    .Introduction-image.-sub { aspect-ratio: 16 / 9; }

    .Introduction-bgFloat {
      position: absolute;
      z-index: 0;
      pointer-events: none;
    }

    .Introduction-bgFloat img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 4px;
      display: block;
    }

    .Introduction-bgFloat.-fl01 {
      top: 50%; left: -8%;
      width: 32rem; height: 22rem;
      opacity: 0;
    }

    .Introduction-bgFloat.-fl02 {
      top: 70%; right: -6%;
      width: 28rem; height: 18rem;
      opacity: 0;
    }

    @media (max-width: 820px) {
      .Introduction { padding-top: 8vh; min-height: 200vh; }
      .Introduction-content { top: 5vh; grid-template-columns: 1fr; gap: 2rem; padding: 0 1rem; }
      .SectionLead-char { font-size: clamp(2rem, 10vw, 3.5rem); }
      .Introduction-headJa { font-size: 1rem; }
      .Introduction-description { font-size: 0.85rem; }
      .Introduction-image.-main { aspect-ratio: 16 / 9; }
      .Introduction-bgFloat.-fl01 { width: 18rem; height: 12rem; left: -3%; }
      .Introduction-bgFloat.-fl02 { width: 16rem; height: 10rem; }
    }
  </style>
</head>
<body>

  <div class="spacer-top"></div>

  <section class="Introduction">
    <div class="Introduction-bgFloat -fl01">
      <img src="https://raw.githubusercontent.com/tatsuhitooka-maker/yasuhira-2/main/images/recruit-img03.webp" alt="">
    </div>
    <div class="Introduction-bgFloat -fl02">
      <img src="https://raw.githubusercontent.com/tatsuhitooka-maker/yasuhira-2/main/images/recruit-img06.webp" alt="">
    </div>

    <div class="Introduction-content">
      <div class="Introduction-textSide">
        <p class="Introduction-title">( Our Solutions )</p>
        <p class="Introduction-lead">
          <span class="SectionLead-row" data-row="0"></span>
          <span class="SectionLead-row" data-row="1"></span>
        </p>
        <h2 class="Introduction-headJa">
          お客様の稼働を止めない<br>一貫したものづくり支援
        </h2>
        <p class="Introduction-description">
          私たちは1937年創業の生産財専門商社。FA装置の設計・製造から精密工作機械・工具の販売や加工技術による試作支援まで、一貫したものづくり支援で、製造業の省人化・自動化・生産性・品質向上を支えます。
        </p>
        <div class="Introduction-button">
          <a href="#">Read More</a>
        </div>
      </div>

      <div class="Introduction-imageSide">
        <div class="Introduction-image -main">
          <img src="https://raw.githubusercontent.com/tatsuhitooka-maker/yasuhira-2/main/images/business-img.webp" alt="業務の様子">
        </div>
        <div class="Introduction-image -sub">
          <img src="https://raw.githubusercontent.com/tatsuhitooka-maker/yasuhira-2/main/images/company-img.webp" alt="会社の様子">
        </div>
      </div>
    </div>
  </section>

  <div class="spacer-bottom"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* 文字分割 */
    const headingLines = ["Made in", "Yasuhira"];
    document.querySelectorAll('.SectionLead-row').forEach((row, i) => {
      headingLines[i].split('').forEach(char => {
        const span = document.createElement('span');
        span.className = 'SectionLead-char' + (char === ' ' ? ' is-space' : '');
        span.textContent = char === ' ' ? '' : char;
        row.appendChild(span);
      });
    });

    /* 登場アニメーション */
    const section = document.querySelector('.Introduction');
    const chars = document.querySelectorAll('.SectionLead-char');

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: section,
        start: 'top 60%',
        end: 'top 10%',
        scrub: false,
        toggleActions: 'play none none reverse',
      }
    });

    tl.to('.Introduction-title', { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' }, 0);
    tl.to(chars, { y: 0, duration: 1, ease: 'power4.out', stagger: { each: 0.03, from: 'start' } }, 0.1);
    tl.to('.Introduction-headJa', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }, 0.4);
    tl.to('.Introduction-description', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }, 0.55);
    tl.to('.Introduction-button', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }, 0.65);

    document.querySelectorAll('.Introduction-image').forEach((img, i) => {
      tl.to(img, { opacity: 1, y: 0, duration: 1, ease: 'power3.out' }, 0.3 + i * 0.15);
    });

    /* 背景浮遊画像 */
    document.querySelectorAll('.Introduction-bgFloat').forEach((fl, i) => {
      gsap.to(fl, {
        opacity: 0.6, y: -30, duration: 1.2, ease: 'power2.out',
        scrollTrigger: { trigger: section, start: `top ${40 - i * 10}%`, toggleActions: 'play none none reverse' }
      });
      gsap.to(fl, {
        y: -60 - (i * 25), ease: 'none',
        scrollTrigger: { trigger: section, start: 'top bottom', end: 'bottom top', scrub: 1.5 }
      });
    });
  </script>
</body>
</html>
