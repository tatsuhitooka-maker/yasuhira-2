        <span class=&quot;HeadingReveal-row&quot; data-row=&quot;1&quot;></span>
        <span class=&quot;HeadingReveal-row&quot; data-row=&quot;2&quot;></span>

  <script src=&quot;https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js&quot;></script>
  <script src=&quot;https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js&quot;></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* 文字分割 */
    const headingLines = [&quot;Since 1937&quot;, &quot;Trusted by&quot;, &quot;Makers&quot;];
    document.querySelectorAll('.HeadingReveal-row').forEach((row, i) => {
      headingLines[i].split('').forEach(char => {
        const span = document.createElement('span');
        span.className = 'HeadingReveal-char' + (char === ' ' ? ' is-space' : '');
        span.textContent = char === ' ' ? '' : char;
        row.appendChild(span);
      });
    });

    /* 登場アニメーション */
    const section = document.querySelector('.Company');
    const chars = document.querySelectorAll('.HeadingReveal-char');

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: section,
        start: 'top 60%',
        end: 'top 10%',
        scrub: false,
        toggleActions: 'play none none reverse',
      }
    });

    tl.to('.Company-title', { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' }, 0);
    tl.to(chars, { y: 0, duration: 1, ease: 'power4.out', stagger: { each: 0.03, from: 'start' } }, 0.1);
    tl.to('.Company-leadJa', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }, 0.5);
    tl.to('.Company-description', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }, 0.6);
    tl.to('.Company-button', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }, 0.7);

    /* 背景画像のスライドイン＋パララックス */
    const slideDirections = [
      { x: -120, y: 40 }, { x: 100, y: 30 }, { x: -80, y: 20 }, { x: 100, y: 30 }, { x: -100, y: 20 },
    ];

    document.querySelectorAll('.Company-bgImage').forEach((img, i) => {
      const dir = slideDirections[i] || { x: 0, y: 40 };
      gsap.set(img, { x: dir.x, y: dir.y });
      gsap.to(img, {
        opacity: 1, x: 0, y: 0, duration: 0.8, ease: 'power3.out',
        scrollTrigger: { trigger: section, start: `top ${55 - i * 7}%`, toggleActions: 'play none none reverse' }
      });
      gsap.to(img, {
        y: -80 - (i * 30), ease: 'none',
        scrollTrigger: { trigger: section, start: 'top bottom', end: 'bottom top', scrub: 1.5 }
      });
    });

    /* 退場アニメーション */
    const exitTl = gsap.timeline({
      scrollTrigger: { trigger: section, start: '40% top', end: '52% top', scrub: true }
    });
    exitTl.to('.Company-title', { opacity: 0, y: -20, duration: 0.3 }, 0);
    exitTl.to('.Company-lead', { opacity: 0, duration: 0.4 }, 0);
    exitTl.to('.Company-leadJa', { opacity: 0, y: -20, duration: 0.3 }, 0.1);
    exitTl.to('.Company-description', { opacity: 0, y: -20, duration: 0.3 }, 0.15);
    exitTl.to('.Company-button', { opacity: 0, y: -20, duration: 0.3 }, 0.2);
  </script>
