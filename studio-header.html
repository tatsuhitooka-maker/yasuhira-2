<!--
  ============================================
  STUDIO ヘッダーカスタムコード
  有料プランで「設定 > カスタムコード > head内」に貼り付け

  機能:
  1. Lenis スムーズスクロール（ぬるっとしたスクロール）
  2. カスタムカーソル（マウスストーカー）
  ============================================
-->

<!-- Lenis スムーズスクロール -->
<script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>

<!-- GSAP（各セクションembed内で読んでいるが、ヘッダーでも保険として） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
  /* カスタムカーソル — デフォルトカーソル非表示 */
  html, body { cursor: none; }
  a, button, [role="button"] { cursor: none; }

  .Cursor {
    position: fixed;
    top: 0; left: 0;
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.3s ease, height 0.3s ease, background 0.3s ease, opacity 0.3s ease;
    mix-blend-mode: difference;
  }

  .Cursor-ring {
    position: fixed;
    top: 0; left: 0;
    width: 40px; height: 40px;
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width 0.4s ease, height 0.4s ease, border-color 0.4s ease, opacity 0.4s ease;
  }

  .Cursor.is-hover { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.15); }
  .Cursor-ring.is-hover { width: 60px; height: 60px; border-color: rgba(255, 255, 255, 0.8); }
  .Cursor.is-text { width: 3px; height: 24px; border-radius: 2px; background: #fff; }
  .Cursor-ring.is-text { opacity: 0; }
  .Cursor.is-hidden, .Cursor-ring.is-hidden { opacity: 0; }

  @media (hover: none), (pointer: coarse) {
    html, body { cursor: auto; }
    a, button, [role="button"] { cursor: pointer; }
    .Cursor, .Cursor-ring { display: none !important; }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    'use strict';

    /* ============================================
       1. Lenis スムーズスクロール
    ============================================ */
    if (typeof Lenis !== 'undefined' && typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
      gsap.registerPlugin(ScrollTrigger);

      var lenis = new Lenis({
        duration: 1.2,
        easing: function (t) { return Math.min(1, 1.001 - Math.pow(2, -10 * t)); },
        smoothWheel: true,
      });

      lenis.on('scroll', ScrollTrigger.update);

      gsap.ticker.add(function (time) {
        lenis.raf(time * 1000);
      });
      gsap.ticker.lagSmoothing(0);

      window.__lenis = lenis;
    }

    /* ============================================
       2. カスタムカーソル
    ============================================ */
    if (window.matchMedia('(hover: none)').matches) return;

    var dot = document.createElement('div');
    dot.className = 'Cursor is-hidden';
    document.body.appendChild(dot);

    var ring = document.createElement('div');
    ring.className = 'Cursor-ring is-hidden';
    document.body.appendChild(ring);

    var mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

    document.addEventListener('mousemove', function (e) {
      mouseX = e.clientX;
      mouseY = e.clientY;
      dot.style.left = mouseX + 'px';
      dot.style.top = mouseY + 'px';
      dot.classList.remove('is-hidden');
      ring.classList.remove('is-hidden');
    });

    document.addEventListener('mouseleave', function () {
      dot.classList.add('is-hidden');
      ring.classList.add('is-hidden');
    });

    function animateRing() {
      ringX += (mouseX - ringX) * 0.15;
      ringY += (mouseY - ringY) * 0.15;
      ring.style.left = ringX + 'px';
      ring.style.top = ringY + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();

    /* ホバー検出 */
    document.querySelectorAll('a, button, [role="button"]').forEach(function (el) {
      el.addEventListener('mouseenter', function () { dot.classList.add('is-hover'); ring.classList.add('is-hover'); });
      el.addEventListener('mouseleave', function () { dot.classList.remove('is-hover'); ring.classList.remove('is-hover'); });
    });

    document.querySelectorAll('h1, h2, h3, h4, p').forEach(function (el) {
      el.addEventListener('mouseenter', function () { dot.classList.add('is-text'); ring.classList.add('is-text'); });
      el.addEventListener('mouseleave', function () { dot.classList.remove('is-text'); ring.classList.remove('is-text'); });
    });
  });
</script>
