<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: #222222;
      color: #fff;
      overflow-x: hidden;
    }

    .spacer-top { height: 100vh; background: #222222; }
    .spacer-bottom { height: 100vh; background: #222222; }

    /* ABOUT Section */
    .About {
      position: relative;
      background-color: #222222;
      color: #fff;
      padding-top: 15vh;
      padding-bottom: 0;
      min-height: 220vh;
    }

    .About-content {
      position: sticky;
      top: 8vh;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem;
      z-index: 2;
    }

    .About-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-align: center;
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(20px);
    }

    .About-lead {
      text-align: center;
      line-height: 0.85;
      margin-bottom: 2rem;
    }

    .SectionLead-row {
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    .SectionLead-char {
      display: inline-block;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-weight: 500;
      font-size: clamp(3rem, 10vw, 10rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      transform: translateY(110%);
      will-change: transform;
    }

    .SectionLead-char.is-space { width: 0.3em; }

    .About-textWrapper {
      margin-left: auto;
      max-width: 480px;
    }

    .About-leadJa {
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 500;
      text-align: right;
      margin-bottom: 2rem;
      opacity: 0;
      transform: translateY(30px);
    }

    .About-description {
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 2;
      letter-spacing: 0.06em;
      margin-bottom: 2rem;
      opacity: 0;
      transform: translateY(30px);
    }

    .About-button {
      width: fit-content;
      opacity: 0;
      transform: translateY(20px);
    }

    .About-button a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 200px;
      padding: 1rem 2.5rem;
      background: transparent;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: background 0.4s ease, border-color 0.4s ease;
    }

    .About-button a:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.6);
    }

    .About-background {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 1480px;
      height: 100%; z-index: 0;
      pointer-events: none;
    }

    .About-bgImage {
      position: absolute;
      overflow: hidden;
      border-radius: 4px;
      opacity: 0;
      will-change: transform, opacity;
    }

    .About-bgImage img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    .About-bgImage.-no01 { top: 8%; left: -2%; width: 36rem; height: 22rem; }
    .About-bgImage.-no02 { top: 4%; right: -4%; width: 30rem; height: 18rem; }
    .About-bgImage.-no03 { top: 44%; left: 2%; width: 22rem; height: 15rem; }
    .About-bgImage.-no04 { top: 60%; right: -2%; width: 32rem; height: 22rem; }
    .About-bgImage.-no05 { top: 78%; left: -3%; width: 38rem; height: 24rem; }

    @media (max-width: 820px) {
      .About { padding-top: 10vh; padding-bottom: 60vh; min-height: 250vh; }
      .About-content { top: 5vh; padding: 0 1rem; }
      .SectionLead-char { font-size: clamp(2.5rem, 12vw, 5rem); }
      .About-description { max-width: 100%; margin-left: 0; font-size: 0.85rem; }
      .About-leadJa { text-align: center; }
      .About-button { margin: 0 auto; }
      .About-bgImage.-no01 { width: 18rem; height: 11rem; top: 25%; left: 0; }
      .About-bgImage.-no02 { width: 16rem; height: 10rem; top: 10%; right: 0; }
      .About-bgImage.-no03 { width: 14rem; height: 9rem; top: 50%; left: 2%; }
      .About-bgImage.-no04 { width: 16rem; height: 11rem; top: 45%; right: 0; }
      .About-bgImage.-no05 { width: 20rem; height: 13rem; top: 70%; left: 0; }
    }
  </style>
</head>
<body>

  <div class="spacer-top"></div>

  <section class="About">
    <div class="About-background">
      <div class="About-bgImage -no01">
        <img src="https://raw.githubusercontent.com/tatsuhitooka-maker/yasuhira-2/main/images/abstract01.jpg" alt="">
      </div>
      <div class="About-bgImage -no02">
        <img src="https://raw.githubusercontent.com/tatsuhitooka-maker/yasuhira-2/main/images/abstract02.jpg" alt="">
      </div>
      <div class="About-bgImage -no03">
        <img src="https://raw.githubusercontent.com/tatsuhitooka-maker/yasuhira-2/main/images/abstract03.jpg" alt="">
      </div>
      <div class="About-bgImage -no04">
        <img src="https://raw.githubusercontent.com/tatsuhitooka-maker/yasuhira-2/main/images/abstract04.jpg" alt="">
      </div>
      <div class="About-bgImage -no05">
        <img src="https://raw.githubusercontent.com/tatsuhitooka-maker/yasuhira-2/main/images/company-img.webp" alt="">
      </div>
    </div>

    <div class="About-content">
      <h2 class="About-title">( About )</h2>
      <p class="About-lead">
        <span class="SectionLead-row" data-row="0"></span>
        <span class="SectionLead-row" data-row="1"></span>
        <span class="SectionLead-row" data-row="2"></span>
      </p>
      <div class="About-textWrapper">
        <p class="About-leadJa">創業87年、ものづくりと共に</p>
        <p class="About-description">
          1937年の創業以来、生産財専門商社として製造業のお客様と共に歩んできました。FA装置の設計・製造、精密工作機械・工具の販売、加工技術による試作支援を通じて、ものづくりの現場を支え続けています。
        </p>
        <div class="About-button">
          <a href="#">Read More</a>
        </div>
      </div>
    </div>
  </section>

  <div class="spacer-bottom"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* 文字分割 */
    const headingLines = ["Since 1937", "Trusted by", "Makers"];
    document.querySelectorAll('.SectionLead-row').forEach((row, i) => {
      headingLines[i].split('').forEach(char => {
        const span = document.createElement('span');
        span.className = 'SectionLead-char' + (char === ' ' ? ' is-space' : '');
        span.textContent = char === ' ' ? '' : char;
        row.appendChild(span);
      });
    });

    /* 登場アニメーション */
    const section = document.querySelector('.About');
    const chars = document.querySelectorAll('.SectionLead-char');

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: section,
        start: 'top 60%',
        end: 'top 10%',
        scrub: false,
        toggleActions: 'play none none reverse',
      }
    });

    tl.to('.About-title', { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' }, 0);
    tl.to(chars, { y: 0, duration: 1, ease: 'power4.out', stagger: { each: 0.03, from: 'start' } }, 0.1);
    tl.to('.About-leadJa', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }, 0.5);
    tl.to('.About-description', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }, 0.6);
    tl.to('.About-button', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }, 0.7);

    /* 背景画像のスライドイン＋パララックス */
    const slideDirections = [
      { x: -120, y: 40 }, { x: 100, y: 30 }, { x: -80, y: 20 }, { x: 100, y: 30 }, { x: -100, y: 20 },
    ];

    document.querySelectorAll('.About-bgImage').forEach((img, i) => {
      const dir = slideDirections[i] || { x: 0, y: 40 };
      gsap.set(img, { x: dir.x, y: dir.y });
      gsap.to(img, {
        opacity: 1, x: 0, y: 0, duration: 0.8, ease: 'power3.out',
        scrollTrigger: { trigger: section, start: `top ${55 - i * 7}%`, toggleActions: 'play none none reverse' }
      });
      gsap.to(img, {
        y: -80 - (i * 30), ease: 'none',
        scrollTrigger: { trigger: section, start: 'top bottom', end: 'bottom top', scrub: 1.5 }
      });
    });

    /* 退場アニメーション */
    const exitTl = gsap.timeline({
      scrollTrigger: { trigger: section, start: '40% top', end: '52% top', scrub: true }
    });
    exitTl.to('.About-title', { opacity: 0, y: -20, duration: 0.3 }, 0);
    exitTl.to('.About-lead', { opacity: 0, duration: 0.4 }, 0);
    exitTl.to('.About-leadJa', { opacity: 0, y: -20, duration: 0.3 }, 0.1);
    exitTl.to('.About-description', { opacity: 0, y: -20, duration: 0.3 }, 0.15);
    exitTl.to('.About-button', { opacity: 0, y: -20, duration: 0.3 }, 0.2);
  </script>
</body>
</html>
