<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
    background: #fff;
    color: #1e1e1e;
    overflow-x: hidden;
  }

  .spacer-top { height: 100vh; background: #fff; }
  .spacer-bottom { height: 100vh; background: #fff; }

  .Solution {
    position: relative;
    background-color: #fff;
    color: #1e1e1e;
    overflow: hidden;
    padding-top: 12vh;
    padding-bottom: 0;
    min-height: 250vh;
  }

  .Solution::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url('https://tatsuhitooka-maker.github.io/yasuhira-2/images/6569768_1824.jpg');
    background-size: contain;
    background-position: left bottom;
    background-repeat: no-repeat;
    transform: scaleX(-1);
    z-index: 0;
    pointer-events: none;
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%);
    mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%);
  }

  .Solution-content {
    position: sticky;
    top: 8vh;
    max-width: 1430px;
    margin: 0 auto;
    padding: 0 2rem;
    z-index: 2;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: start;
  }

  .Solution-textSide { padding-top: 2rem; }
  .Solution-lead { line-height: 0.9; margin-bottom: 2.5rem; }

  .HeadingReveal-row {
    display: flex;
    justify-content: flex-start;
    overflow: hidden;
  }

  .HeadingReveal-char {
    display: inline-block;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-weight: 500;
    font-size: clamp(3.5rem, 9vw, 8.25rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
    transform: translateY(110%);
    will-change: transform;
    transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .HeadingReveal-char.is-space { width: 0.3em; }
  .HeadingReveal-char.is-visible { transform: translateY(0); }

  .Solution-headJa {
    font-size: clamp(1.1rem, 2vw, 1.6rem);
    font-weight: 700;
    line-height: 1.8;
    margin-bottom: 2rem;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .Solution-description {
    font-size: 0.95rem;
    font-weight: 400;
    line-height: 2.2;
    letter-spacing: 0.04em;
    color: rgba(30, 30, 30, 0.7);
    margin-bottom: 2.5rem;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .Solution-button {
    width: fit-content;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .Solution-button a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 200px;
    padding: 1rem 2.5rem;
    background: transparent;
    color: #1e1e1e;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    border-radius: 50px;
    border: 1px solid rgba(30, 30, 30, 0.3);
    transition: background 0.4s ease, border-color 0.4s ease;
  }

  .Solution-button a:hover {
    background: rgba(30, 30, 30, 0.06);
    border-color: rgba(30, 30, 30, 0.6);
  }

  .Solution-imageSide {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .Solution-image {
    border-radius: 6px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 1s ease, transform 1s ease;
  }

  .Solution-image img {
    width: 100%; height: auto;
    display: block;
    object-fit: cover;
  }

  .Solution-image.-main { aspect-ratio: 4 / 3; }
  .Solution-image.-sub { aspect-ratio: 16 / 9; }

  .Solution-bgFloat {
    position: absolute;
    z-index: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.2s ease, transform 1.2s ease;
  }

  .Solution-bgFloat img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 4px;
    display: block;
  }

  .Solution-bgFloat.-fl01 {
    top: 50%; left: -8%;
    width: 32rem; height: 22rem;
  }

  .Solution-bgFloat.-fl02 {
    top: 70%; right: -6%;
    width: 28rem; height: 18rem;
  }

  /* アニメーション発火クラス */
  .is-show .Solution-headJa,
  .is-show .Solution-description,
  .is-show .Solution-button,
  .is-show .Solution-image {
    opacity: 1;
    transform: translateY(0);
  }

  .is-show .Solution-image:nth-child(2) { transition-delay: 0.15s; }

  .is-show .Solution-bgFloat {
    opacity: 0.6;
    transform: translateY(-30px);
  }

  .is-show .Solution-bgFloat.-fl02 { transition-delay: 0.2s; }

  @media (max-width: 820px) {
    .Solution { padding-top: 8vh; min-height: 200vh; }
    .Solution-content { top: 5vh; grid-template-columns: 1fr; gap: 2rem; padding: 0 1rem; }
    .HeadingReveal-char { font-size: clamp(2rem, 10vw, 3.5rem); }
    .Solution-headJa { font-size: 1rem; }
    .Solution-description { font-size: 0.85rem; }
    .Solution-image.-main { aspect-ratio: 16 / 9; }
    .Solution-bgFloat.-fl01 { width: 18rem; height: 12rem; left: -3%; }
    .Solution-bgFloat.-fl02 { width: 16rem; height: 10rem; }
  }
</style>

<div class="spacer-top"></div>

<section class="Solution">
  <div class="Solution-bgFloat -fl01">
    <img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img03.png" alt="">
  </div>
  <div class="Solution-bgFloat -fl02">
    <img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/recruit/recruit-img06.png" alt="">
  </div>

  <div class="Solution-content">
    <div class="Solution-textSide">
      <p class="Solution-lead">
        <span class="HeadingReveal-row" data-row="0"></span>
        <span class="HeadingReveal-row" data-row="1"></span>
      </p>
      <h2 class="Solution-headJa">
        お客様の稼働を止めない<br>一貫したものづくり支援
      </h2>
      <p class="Solution-description">
        私たちは1937年創業の生産財専門商社。FA装置の設計・製造から精密工作機械・工具の販売や加工技術による試作支援まで、一貫したものづくり支援で、製造業の省人化・自動化・生産性・品質向上を支えます。
      </p>
      <div class="Solution-button">
        <a href="#">Read More</a>
      </div>
    </div>

    <div class="Solution-imageSide">
      <div class="Solution-image -main">
        <img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/business-img.webp" alt="業務の様子">
      </div>
      <div class="Solution-image -sub">
        <img src="https://tatsuhitooka-maker.github.io/yasuhira-2/images/company-img.webp" alt="会社の様子">
      </div>
    </div>
  </div>
</section>

<div class="spacer-bottom"></div>

<script>
(function() {
  /* 文字分割 */
  var headingLines = ['Made in', 'Yasuhira'];
  var rows = document.querySelectorAll('.HeadingReveal-row');
  rows.forEach(function(row, i) {
    headingLines[i].split('').forEach(function(char) {
      var span = document.createElement('span');
      span.className = 'HeadingReveal-char' + (char === ' ' ? ' is-space' : '');
      span.textContent = char === ' ' ? '' : char;
      row.appendChild(span);
    });
  });

  /* IntersectionObserver でスクロール検知 */
  var section = document.querySelector('.Solution');
  var chars = document.querySelectorAll('.HeadingReveal-char');

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        /* 文字送り：stagger風にdelayをずらす */
        chars.forEach(function(c, i) {
          setTimeout(function() {
            c.classList.add('is-visible');
          }, i * 30);
        });
        /* 他の要素にis-showクラス付与 */
        setTimeout(function() {
          section.classList.add('is-show');
        }, 200);
      } else {
        /* 画面外に出たらリセット */
        chars.forEach(function(c) { c.classList.remove('is-visible'); });
        section.classList.remove('is-show');
      }
    });
  }, { threshold: 0.15 });

  observer.observe(section);
})();
</script>
