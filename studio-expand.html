<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: #222222;
      color: #fff;
      overflow-x: hidden;
    }

    .spacer-top { height: 100vh; background: #222222; }
    .spacer-bottom { height: 100vh; background: #222222; }

    /* EXPAND Section */
    .Vision {
      position: relative;
      background-color: #222222;
      padding-top: 6vh;
      min-height: 250vh;
    }

    .Vision-header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .Vision-title {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(20px);
    }

    .Vision-lead { line-height: 0.9; margin-bottom: 2rem; }

    .Vision-leadRow {
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    .Vision-leadChar {
      display: inline-block;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-weight: 500;
      font-size: clamp(3rem, 8vw, 7rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      transform: translateY(110%);
      will-change: transform;
    }

    .Vision-leadChar.is-space { width: 0.3em; }

    .Vision-headJa {
      font-size: clamp(1rem, 1.8vw, 1.4rem);
      font-weight: 700;
      line-height: 1.8;
      opacity: 0;
      transform: translateY(30px);
    }

    .Vision-imageWrap {
      position: sticky;
      top: 10vh;
      width: 90%;
      max-width: 1300px;
      margin: 0 auto;
      border-radius: 16px;
      overflow: hidden;
      will-change: width, max-width, border-radius;
    }

    .Vision-imageWrap img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      aspect-ratio: 16 / 9;
    }

    @media (max-width: 820px) {
      .Vision { padding-top: 4vh; min-height: 200vh; }
      .Vision-imageWrap { width: 92%; top: 5vh; }
      .Vision-leadChar { font-size: clamp(2rem, 10vw, 3.5rem); }
      .Vision-headJa { font-size: 0.95rem; padding: 0 1rem; }
    }
  </style>
</head>
<body>

  <div class="spacer-top"></div>

  <section class="Vision">
    <div class="Vision-header">
      <p class="Vision-lead">
        <span class="Vision-leadRow" data-row="0"></span>
        <span class="Vision-leadRow" data-row="1"></span>
      </p>
      <h2 class="Vision-headJa">
        最新技術で、ものづくりの未来を拓く
      </h2>
    </div>

    <div class="Vision-imageWrap">
      <img src="images/abstract06.jpg" alt="最新技術">
    </div>
  </section>

  <div class="spacer-bottom"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* 文字分割 */
    const headingLines = ["Next New", "Technology"];
    document.querySelectorAll('.Vision-leadRow').forEach((row, i) => {
      headingLines[i].split('').forEach(char => {
        const span = document.createElement('span');
        span.className = 'Vision-leadChar' + (char === ' ' ? ' is-space' : '');
        span.textContent = char === ' ' ? '' : char;
        row.appendChild(span);
      });
    });

    /* テキスト登場アニメーション */
    const section = document.querySelector('.Vision');
    const chars = document.querySelectorAll('.Vision-leadChar');

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: section,
        start: 'top 60%',
        end: 'top 10%',
        scrub: false,
        toggleActions: 'play none none reverse',
      }
    });

    tl.to(chars, { y: 0, duration: 1, ease: 'power4.out', stagger: { each: 0.03, from: 'start' } }, 0);
    tl.to('.Vision-headJa', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }, 0.4);

    /* 画像拡大（90% → 100vw） */
    const imageWrap = document.querySelector('.Vision-imageWrap');
    gsap.to(imageWrap, {
      width: '100vw', maxWidth: '100vw', borderRadius: '0px', ease: 'none',
      scrollTrigger: { trigger: imageWrap, start: 'top 60%', end: 'top 5%', scrub: 1 }
    });
  </script>
</body>
</html>
